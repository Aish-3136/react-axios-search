<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page — Aishwarya Kadam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Aishwarya Kadam</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#features">Features</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HERO -->
<section id="home" class="hero d-flex align-items-center text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">Hi, I'm Aishwarya Kadam</h1>
        <p class="lead">Second Year Computer Engineering Student at VCET</p>
        <button class="btn btn-gradient btn-lg" onclick="showMessage()">Get Started</button>
    </div>
</section>

<!-- FEATURES -->
<section id="features" class="py-5 features-section">
    <div class="container text-center">
        <h2 class="mb-4">Features</h2>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="feature-card" onclick="featureClick('Responsive Design')">
                    <h4>Responsive</h4>
                    <p>Works on all devices</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="feature-card" onclick="featureClick('Easy to Use')">
                    <h4>Easy</h4>
                    <p>Simple layout</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="feature-card" onclick="featureClick('Modern UI')">
                    <h4>Modern</h4>
                    <p>Clean design</p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-5 contact-section">
    <div class="container" style="max-width: 500px;">
        <h2 class="text-center mb-4">Contact Me</h2>

        <form onsubmit="return validateForm()">
            <input type="text" id="name" placeholder="Enter Name" class="form-control mb-3">
            <input type="email" id="email" placeholder="Enter Email" class="form-control mb-3">

            <div class="text-center">
                <button class="btn btn-gradient px-4">Submit</button>
            </div>
        </form>
    </div>
</section>

<footer class="text-white text-center py-3 footer">
    <p class="mb-0">© 2026 Aishwarya Kadam</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
